<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cardápio Digital - Conveniência Oliveira</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding: 0; margin: 0; }
        .menu-header {
            background: linear-gradient(135deg, var(--surface), var(--bg));
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }
        .menu-header::before {
            content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(245,158,11,0.07) 0%,transparent 70%);
            pointer-events: none;
        }
        .menu-logo {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .menu-mesa {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            color: var(--text2);
            font-family: 'DM Mono', monospace;
            margin-top: 8px;
        }
        .menu-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px; /* Space for the bottom cart bar */
        }
        .category-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin: 30px 0 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .menu-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .menu-item:hover {
            border-color: var(--border2);
        }
        .item-info { flex: 1; }
        .item-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 4px;
        }
        .item-desc {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 8px;
        }
        .item-price {
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            color: var(--accent);
            font-weight: 600;
        }
        .add-btn {
            background: var(--surface3);
            color: var(--text);
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            margin-left: 15px;
        }
        .add-btn:active {
            background: var(--accent);
            color: #000;
            transform: scale(0.95);
        }
        
        /* Fixed Bottom Cart */
        .floating-cart {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .floating-cart.visible {
            transform: translateY(0);
        }
        .cart-info {
            display: flex;
            flex-direction: column;
        }
        .cart-amount {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
        }
        .cart-items-count {
            font-size: 12px;
            color: var(--text2);
        }
        .btn-view-cart {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(245,158,11,0.3);
        }
        
        /* QR Code Generator Helper Screen (Secret for Admin) */
        #qrSetup { display: none; padding: 20px; text-align: center; }
        
        /* Client Cart Modal Overrides */
        #clientModalOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; padding: 0;
            align-items: flex-end; /* Pop from bottom on mobile */
        }
        #clientModalOverlay.open { display: flex; }
        .client-modal {
            background: var(--surface);
            width: 100%; height: 85vh;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        
        .c-cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        
        .qty-controls {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface2);
            border-radius: 20px;
            padding: 4px;
        }
        .q-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none; background: var(--surface3); color: var(--text);
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Send Button */
        .btn-send-order {
            width: 100%; background: var(--green); color: #000;
            border: none; border-radius: 12px; padding: 16px;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
            margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="menu-header">
        <img src="img/logo.jpg" alt="Logo" style="width:100px; height:100px; object-fit: cover; border-radius: 50%; border: 3px solid #f59e0b; margin: 0 auto 12px; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <div class="menu-logo" style="justify-content:center;">Conveniência Oliveira</div>
        <div class="menu-subtitle" style="text-align:center; color:var(--text3); font-size:14px; margin-bottom:8px;">Cardápio Digital &bull; Peça direto da mesa</div>
        <div id="mesaDisplay" class="menu-mesa">Carregando...</div>
        
        <div style="margin-top: 20px; max-width: 400px; margin-left: auto; margin-right: auto;">
            <input type="text" placeholder="🔍 Buscar produto ou bebida..." onkeyup="filtrarCardapio(this.value)" style="width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; box-sizing: border-box; text-align: center;">
        </div>
    </div>

    <div class="menu-container" id="menuContainer">
        <!-- Menu categories will be injected here -->
        <div style="text-align:center; padding: 40px; color: var(--text3)">Carregando cardápio...</div>
    </div>

    <!-- Floating Bottom Bar -->
    <div class="floating-cart" id="floatingCart">
        <div class="cart-info">
            <span class="cart-items-count" id="cartCountTxt">0 itens</span>
            <span class="cart-amount" id="cartTotalTxt">R$ 0,00</span>
        </div>
        <button class="btn-view-cart" onclick="openClientCart()">Ver Pedido</button>
    </div>

    <!-- Cart Modal -->
    <div id="clientModalOverlay">
        <div class="client-modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h2 style="margin:0; font-family:'Syne',sans-serif; font-size:22px">Seu Pedido</h2>
                <button onclick="closeClientCart()" style="background:none;border:none;color:var(--text);font-size:24px;cursor:pointer">✕</button>
            </div>
            
            <div id="clientCartItems" style="flex:1; overflow-y:auto;">
                <!-- Items here -->
            </div>
            
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border)">
                <div style="display:flex; justify-content:space-between; font-size: 18px; font-weight: 600; margin-bottom: 12px;">
                    <span>Total a pagar:</span>
                    <span id="modalTotalTxt" class="text-amber">R$ 0,00</span>
                </div>
                <div style="margin-bottom: 10px;">
                    <div style="position:relative;">
                        <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:16px;">👤</span>
                        <input type="text" id="pedidoNome" placeholder="Seu nome (obrigatório)" style="width:100%; border:1px solid var(--border); background:var(--surface2); padding:11px 10px 11px 38px; border-radius:12px; color:var(--text); font-size:15px; box-sizing:border-box;">
                    </div>
                    <div id="nomeError" style="color:#ef4444; font-size:12px; margin-top:4px; display:none;">⚠️ Por favor, informe seu nome</div>
                </div>
                <div style="margin-bottom: 12px;">
                    <input type="text" id="pedidoObs" placeholder="Alguma observação? (ex: sem gelo)" style="width:100%; border:1px solid var(--border); background:var(--surface2); padding:10px; border-radius:12px; color:var(--text); box-sizing:border-box;">
                </div>
                <button class="btn-send-order" id="btnSendOrder" onclick="sendOrderToSystem()">🍽️ Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <!-- Toasts (reused from style.css) -->
    <div class="toast-container" id="toastContainer"></div>

<script>
// ==================== LÓGICA DO CARDÁPIO ====================
let clientCart = [];
let mesaNumber = 'Balcão';
let GOOGLE_SHEETS_URL = '';
window.allProducts = [];

function fmt(v){return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}

function showToast(msg, type='success'){
    const t=document.createElement('div');
    t.className='toast '+type;
    t.textContent=msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(), 2500);
}

// Inicializar carregando os dados do LocalStorage (num app real, viria via Fetch da API)
async function initMenu() {
    // Pegar o número da mesa via URL parameter (ex: cardapio.html?mesa=5&gs=...)
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('mesa')) {
        mesaNumber = 'Mesa ' + urlParams.get('mesa');
    }
    if(urlParams.has('gs')) {
        GOOGLE_SHEETS_URL = decodeURIComponent(urlParams.get('gs'));
    }
    document.getElementById('mesaDisplay').textContent = mesaNumber;

    let produtos = [];

    if (GOOGLE_SHEETS_URL) {
        document.getElementById('menuContainer').innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text3)">Baixando cardápio atualizado...</div>`;
        try {
            const res = await fetch(GOOGLE_SHEETS_URL + '?action=carregar_cardapio');
            const data = await res.json();
            produtos = data.produtos.filter(p => p.status === 'ativo');
        } catch(e) {
            console.error('Erro ao buscar dados da nuvem', e);
            showToast('Erro ao carregar cardápio da nuvem. Sincronizando dados locais...', 'error');
        }
    }

    if(produtos.length === 0) {
        const dbString = localStorage.getItem('convpro_db');
        if (!dbString) {
            document.getElementById('menuContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🛒</div>
                    <div style="margin-top: 10px; font-size: 16px">Sistema offline ou sem produtos cadastrados.</div>
                </div>`;
            return;
        }
        const DB = JSON.parse(dbString);
        produtos = DB.produtos.filter(p => p.status === 'ativo');
    }

    window.allProducts = produtos;
    renderCategories(produtos);
}

function renderCategories(produtos) {
    if(produtos.length === 0) {
        document.getElementById('menuContainer').innerHTML = '<div style="text-align:center; padding:40px; color:var(--text3)">Nenhum produto encontrado.</div>';
        return;
    }

    // Agrupar por Categoria
    const categoriasBase = {};
    produtos.forEach(p => {
        if(!categoriasBase[p.categoria]) categoriasBase[p.categoria] = [];
        categoriasBase[p.categoria].push(p);
    });

    let html = '';
    
    for (const [catName, prods] of Object.entries(categoriasBase)) {
        let icon = '🛒';
        if(catName.toLowerCase().includes('espetinho')) icon = '🔥';
        if(catName.toLowerCase().includes('bebida') || catName.toLowerCase().includes('cerveja') || catName.toLowerCase().includes('refrigerante')) icon = '🍺';
        if(catName.toLowerCase().includes('doce')) icon = '🍬';
        
        html += `<div class="category-title">${icon} ${catName}</div>`;
        
        prods.forEach(p => {
            html += `
            <div class="menu-item">
                <div class="item-info">
                    <div class="item-name">${p.nome}</div>
                    <div class="item-price">${fmt(p.preco)}</div>
                </div>
                <button class="add-btn" onclick="addToClientCart(${p.id}, '${p.nome.replace(/'/g, "\\'")}', ${p.preco})">+</button>
            </div>`;
        });
    }

    document.getElementById('menuContainer').innerHTML = html;
}

function filtrarCardapio(termo) {
    const t = termo.toLowerCase().trim();
    if(!t) {
        renderCategories(window.allProducts);
        return;
    }
    const filtrados = window.allProducts.filter(p => p.nome.toLowerCase().includes(t) || p.categoria.toLowerCase().includes(t));
    renderCategories(filtrados);
}

// ==================== CARRINHO DO CLIENTE ====================
function addToClientCart(id, nome, preco) {
    const ex = clientCart.find(x => x.id === id);
    if (ex) {
        ex.qtd++;
    } else {
        clientCart.push({ id, nome, preco, qtd: 1 });
    }
    
    // Pequeno feedback tátil (vibração no celular) se suportado
    if (navigator.vibrate) navigator.vibrate(50);
    
    updateFloatingCart();
    showToast(`${nome} adicionado!`);
}

function updateFloatingCart() {
    const el = document.getElementById('floatingCart');
    if (clientCart.length === 0) {
        el.classList.remove('visible');
        if(document.getElementById('clientModalOverlay').classList.contains('open')) {
            closeClientCart();
        }
        return;
    }

    let qtdTotal = 0;
    let valorTotal = 0;
    
    clientCart.forEach(i => {
        qtdTotal += i.qtd;
        valorTotal += (i.preco * i.qtd);
    });

    document.getElementById('cartCountTxt').textContent = `${qtdTotal} item(s)`;
    document.getElementById('cartTotalTxt').textContent = fmt(valorTotal);
    document.getElementById('modalTotalTxt').textContent = fmt(valorTotal);
    
    el.classList.add('visible');
    renderClientCartModal(); // Atualiza o modal caso esteja aberto
}

function openClientCart() {
    document.getElementById('clientModalOverlay').classList.add('open');
    renderClientCartModal();
}
function closeClientCart() {
    document.getElementById('clientModalOverlay').classList.remove('open');
}

function renderClientCartModal() {
    const container = document.getElementById('clientCartItems');
    if(clientCart.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text3)">Carrinho vazio.</div>';
        return;
    }

    container.innerHTML = clientCart.map((item, index) => `
        <div class="c-cart-item">
            <div>
                <div style="font-weight: 600; font-size: 15px">${item.nome}</div>
                <div class="text-amber mono" style="font-size: 13px">${fmt(item.preco * item.qtd)}</div>
            </div>
            <div class="qty-controls">
                <button class="q-btn" onclick="modifyQty(${index}, -1)">-</button>
                <span class="mono" style="width: 20px; text-align:center; font-weight:600">${item.qtd}</span>
                <button class="q-btn" onclick="modifyQty(${index}, 1)">+</button>
            </div>
        </div>
    `).join('');
}

function modifyQty(index, delta) {
    clientCart[index].qtd += delta;
    if (clientCart[index].qtd <= 0) {
        clientCart.splice(index, 1);
    }
    updateFloatingCart();
}

// ==================== FECHAR PEDIDO (INTEGRAÇÃO WHATSAPP + SININHO) ====================
const WHATSAPP_PHONE = "5583996912439";

function buildWhatsAppMessage(nomeCliente, obs) {
    const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    let text = `🔔 *NOVO PEDIDO - ${mesaNumber}*\n`;
    text += `👤 *Cliente: ${nomeCliente}*\n`;
    text += `🕐 ${hora}\n`;
    text += `━━━━━━━━━━━━━━━━\n\n`;

    let total = 0;
    clientCart.forEach(item => {
        const sub = item.preco * item.qtd;
        total += sub;
        text += `▸ ${item.qtd}x ${item.nome}  ➜  ${fmt(sub)}\n`;
    });

    text += `\n━━━━━━━━━━━━━━━━\n`;
    text += `💰 *TOTAL: ${fmt(total)}*\n`;
    
    if(obs && obs.trim()) {
        text += `\n📝 _Obs: ${obs}_\n`;
    }

    text += `\n✅ Pode preparar! Obrigado 🙏`;
    return text;
}

function sendToWhatsApp(nomeCliente, obs) {
    const text = buildWhatsAppMessage(nomeCliente, obs);
    const encoded = encodeURIComponent(text);
    window.open(`https://api.whatsapp.com/send/?phone=${WHATSAPP_PHONE}&text=${encoded}&type=phone_number&app_absent=0`, '_blank');
}

async function sendOrderToSystem() {
    if (clientCart.length === 0) return;
    
    // Validar nome obrigatório
    const nomeVal = (document.getElementById('pedidoNome').value || '').trim();
    const nomeError = document.getElementById('nomeError');
    const nomeInput = document.getElementById('pedidoNome');
    
    if (!nomeVal) {
        nomeError.style.display = 'block';
        nomeInput.style.borderColor = '#ef4444';
        nomeInput.focus();
        nomeInput.addEventListener('input', function handler() {
            if (nomeInput.value.trim()) {
                nomeError.style.display = 'none';
                nomeInput.style.borderColor = 'var(--border)';
                nomeInput.removeEventListener('input', handler);
            }
        });
        return;
    }
    
    const obsVal = document.getElementById('pedidoObs').value || '';

    const btn = document.getElementById('btnSendOrder');
    const oldText = btn.innerHTML;
    btn.innerHTML = '⏳ Enviando pedido...';
    btn.disabled = true;

    // 1) Salvar no Google Sheets (para o sininho pegar)
    if (GOOGLE_SHEETS_URL) {
        try {
            const d = new Date();
            const localIso = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, -1);
            
            const pedido = {
                cliente: mesaNumber + ' — ' + nomeVal,
                dtAtualizacao: localIso,
                obs: obsVal,
                itens: clientCart
            };
            
            await fetch(GOOGLE_SHEETS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'novo_pedido', pedido }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
        } catch(e) {
            console.error('Erro ao salvar na planilha:', e);
        }
    }

    // 2) SEMPRE enviar pelo WhatsApp também
    sendToWhatsApp(nomeVal, obsVal);

    // 3) Feedback e limpar carrinho
    showToast('✅ Pedido enviado com sucesso!', 'success');
    
    clientCart = [];
    document.getElementById('pedidoNome').value = '';
    document.getElementById('pedidoObs').value = '';
    updateFloatingCart();
    closeClientCart();
    
    btn.innerHTML = oldText;
    btn.disabled = false;
}

// Inicializar ao carregar
window.onload = initMenu;

</script>
</body>
</html>
